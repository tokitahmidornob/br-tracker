<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BR Live Pro | Telemetry Command</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #00ff88; --bg: #020617; --card: #1e293b; --text: #f8fafc; --danger: #ef4444; }
        body, html { margin: 0; padding: 0; height: 100vh; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
        
        #gate-screen { position: fixed; inset: 0; z-index: 9999; background: var(--bg); display: flex; align-items: center; justify-content: center; padding: 20px; }
        .gate-card { background: var(--card); padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; border: 1px solid #334155; }
        .gate-input { width: 100%; padding: 12px; margin-bottom: 20px; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 8px; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .btn-track { background: var(--primary); color: #000; }
        .btn-broadcast { background: transparent; border: 2px solid var(--primary); color: var(--primary); }

        #app-shell { display: none; flex-direction: column; height: 100vh; }
        .header { padding: 10px 20px; background: var(--card); border-bottom: 2px solid var(--primary); display: flex; justify-content: space-between; align-items: center; }
        #map { flex: 2; width: 100%; }
        
        /* --- TELEMETRY GRAPH SECTION --- */
        #telemetry { flex: 1; background: #0a0f1e; padding: 10px; border-top: 1px solid #334155; display: flex; flex-direction: column; }
        #speedChart { max-height: 150px; width: 100% !important; }

        .panel { background: var(--card); padding: 10px; border-top: 2px solid var(--primary); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        select, input { background: #0f172a; border: 1px solid #334155; color: white; padding: 10px; border-radius: 6px; width: 100%; box-sizing: border-box; font-size: 12px; }
    </style>
</head>
<body>

    <div id="gate-screen">
        <div class="gate-card">
            <h1 style="color:var(--primary); margin:0;">🚂 BR LIVE <span style="font-weight:100">TELEMETRY</span></h1>
            <input type="text" id="pName" class="gate-input" placeholder="Enter Your Name">
            <button class="btn-main btn-track" onclick="nav('track')">DETECTOR MODE</button>
            <button class="btn-main btn-broadcast" onclick="nav('broadcast')">LOCO-TELEMETRY MODE</button>
        </div>
    </div>

    <div id="app-shell">
        <header class="header">
            <h2 style="margin:0; font-size: 14px;">COMMAND CENTER</h2>
            <div id="live-kmh" style="font-weight:bold; color:var(--primary); font-size: 18px;">0 KM/H</div>
        </header>

        <div id="map"></div>

        <div id="telemetry">
            <div style="font-size: 10px; color: #94a3b8; margin-bottom: 5px; text-transform: uppercase;">Real-Time Velocity Graph (KM/H)</div>
            <canvas id="speedChart"></canvas>
        </div>

        <div class="panel" id="bPanel" style="display:none;">
            <div class="grid">
                <select id="tSelect">
                    <option value="Upakul_Express">Upakul Express (711/712)</option>
                    <option value="Subarna_Express">Subarna Express (701)</option>
                    <option value="Sonar_Bangla">Sonar Bangla (787)</option>
                </select>
                <input type="time" id="tDep">
            </div>
            <button id="mBtn" onclick="run()" style="width:100%; padding:12px; background:var(--primary); color:#000; font-weight:bold; border:none; border-radius:8px;">START TELEMETRY</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAGLVy1OUiXKuqF4fwsR8KLdm-7-TuZt1g",
            authDomain: "holmes-train-tracker.firebaseapp.com",
            projectId: "holmes-train-tracker",
            databaseURL: "https://holmes-train-tracker-default-rtdb.firebaseio.com/",
            appId: "1:268759875143:web:00031813d14107dfe03b62"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let user = "";

        // --- CHART INITIALIZATION ---
        const ctx = document.getElementById('speedChart').getContext('2d');
        const speedChart = new Chart(ctx, {
            type: 'line',
            data: { labels: Array(20).fill(''), datasets: [{ label: 'KM/H', data: Array(20).fill(0), borderColor: '#00ff88', tension: 0.4, fill: true, backgroundColor: 'rgba(0, 255, 136, 0.1)' }] },
            options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, grid: { color: '#334155' } }, x: { display: false } }, plugins: { legend: { display: false } } }
        });

        function nav(m) {
            user = document.getElementById('pName').value;
            if(!user) return alert("Identify yourself!");
            document.getElementById('gate-screen').style.display = 'none';
            document.getElementById('app-shell').style.display = 'flex';
            if(m === 'broadcast') document.getElementById('bPanel').style.display = 'block';
            loadMap();
        }

        let map, markers = {};
        function loadMap() {
            map = L.map('map', {zoomControl: false}).setView([23.8103, 90.4125], 7);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            db.ref('active_probes').on('value', snap => {
                const data = snap.val() || {};
                for(let k in markers) map.removeLayer(markers[k]);
                for(let k in data) {
                    const p = data[k];
                    markers[k] = L.marker([p.lat, p.lng]).addTo(map).bindPopup(`<b>${p.train}</b><br>Tracker: ${p.name}<br>Speed: ${p.speed} KM/H`);
                }
            });
        }

        let wID = null;
        function run() {
            const btn = document.getElementById('mBtn');
            if(!wID) {
                wID = navigator.geolocation.watchPosition(pos => {
                    const speed = Math.round((pos.coords.speed || 0) * 3.6);
                    document.getElementById('live-kmh').innerText = speed + " KM/H";
                    
                    // Update Graph
                    speedChart.data.datasets[0].data.push(speed);
                    speedChart.data.datasets[0].data.shift();
                    speedChart.update('none');

                    db.ref('active_probes/' + user).set({
                        name: user, train: document.getElementById('tSelect').value,
                        lat: pos.coords.latitude, lng: pos.coords.longitude,
                        speed: speed, ts: Date.now()
                    });
                    btn.innerText = "STOP TRANSMISSION"; btn.style.background = "#ef4444";
                }, null, {enableHighAccuracy: true});
            } else {
                navigator.geolocation.clearWatch(wID); wID = null;
                db.ref('active_probes/' + user).remove();
                btn.innerText = "START TELEMETRY"; btn.style.background = "#00ff88";
            }
        }
    </script>
</body>
</html>
