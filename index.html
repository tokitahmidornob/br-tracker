<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BR Live | Real-Time Railway Tracking</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/button/all.min.css" />
    
    <style>
        :root {
            --primary: #00ff88;
            --accent: #3b82f6;
            --bg: #020617;
            --card: #1e293b;
            --text: #f8fafc;
            --danger: #ef4444;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; 
            font-family: 'Inter', -apple-system, sans-serif; 
            background: var(--bg); color: var(--text);
            overflow: hidden;
        }

        /* --- UI Layout --- */
        .app-container { display: flex; flex-direction: column; height: 100vh; }

        .header {
            padding: 1rem; background: var(--card);
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--primary);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 1000;
        }

        #map { flex-grow: 1; width: 100%; z-index: 1; }

        /* --- Control Panel --- */
        .bottom-sheet {
            background: var(--card);
            padding: 1.5rem;
            border-radius: 20px 20px 0 0;
            box-shadow: 0 -10px 25px rgba(0,0,0,0.5);
            z-index: 1000;
        }

        .input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }

        select, input {
            background: #0f172a; border: 1px solid #334155;
            color: white; padding: 12px; border-radius: 8px; font-size: 14px;
        }

        .btn-broadcast {
            width: 100%; padding: 15px; border: none; border-radius: 12px;
            font-weight: 800; text-transform: uppercase; cursor: pointer;
            transition: 0.3s; letter-spacing: 1px;
            background: var(--primary); color: #000;
        }

        .btn-broadcast.active { background: var(--danger); color: white; }

        /* --- Stats Overlay --- */
        .stats-overlay {
            position: absolute; top: 80px; left: 10px; z-index: 500;
            background: rgba(30, 41, 59, 0.9); padding: 10px;
            border-radius: 8px; border-left: 4px solid var(--primary);
            pointer-events: none;
        }

        .stat-item { font-size: 12px; margin: 5px 0; color: #94a3b8; }
        .stat-value { color: var(--primary); font-weight: bold; font-size: 14px; }

        /* Custom Marker */
        .train-dot {
            width: 14px; height: 14px; background: var(--primary);
            border: 2px solid white; border-radius: 50%;
            box-shadow: 0 0 15px var(--primary);
        }
    </style>
</head>
<body>

<div class="app-container">
    <header class="header">
        <div style="display:flex; align-items:center; gap:10px;">
            <span style="font-size: 24px;">🚂</span>
            <h1 style="font-size: 18px; margin:0; letter-spacing:1px;">BR LIVE <span style="font-weight:300; color:var(--primary)">PRO</span></h1>
        </div>
        <div id="connection-status" style="font-size: 10px; background:#064e3b; padding:4px 8px; border-radius:10px; color:var(--primary)">ONLINE</div>
    </header>

    <div id="map"></div>

    <div class="stats-overlay" id="activeStats" style="display:none;">
        <div class="stat-item">ACTIVE TRAIN: <span class="stat-value" id="disp-name">-</span></div>
        <div class="stat-item">LIVE SPEED: <span class="stat-value" id="disp-speed">0 KM/H</span></div>
        <div class="stat-item">DEP. TIME: <span class="stat-value" id="disp-dep">-</span></div>
    </div>

    <section class="bottom-sheet">
        <div class="input-group">
            <select id="trainName">
                <option value="">-- Choose Train --</option>
                <optgroup label="Chittagong Route">
                    <option value="Subarna_Express">Subarna Express (701)</option>
                    <option value="Mohanagar_Provati">Mohanagar Provati (703)</option>
                    <option value="Turna_Express">Turna Express (741)</option>
                    <option value="Sonar_Bangla">Sonar Bangla (787)</option>
                </optgroup>
                <optgroup label="Sylhet Route">
                    <option value="Parabat_Express">Parabat Express (709)</option>
                    <option value="Upakul_Express">Upakul Express (711)</option>
                </optgroup>
                <optgroup label="North Bengal">
                    <option value="Ekota_Express">Ekota Express (705)</option>
                    <option value="Lalmoni_Express">Lalmoni Express (751)</option>
                </optgroup>
            </select>
            <input type="time" id="depTime">
        </div>
        <button class="btn-broadcast" id="mainBtn" onclick="toggleSystem()">Start Broadcasting</button>
    </section>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
    // --- FIREBASE CONFIG (STRICTLY FOR HOLMES PROJECT) ---
    const firebaseConfig = {
        apiKey: "AIzaSyAGLVy1OUiXKuqF4fwsR8KLdm-7-TuZt1g",
        authDomain: "holmes-train-tracker.firebaseapp.com",
        projectId: "holmes-train-tracker",
        storageBucket: "holmes-train-tracker.firebasestorage.app",
        messagingSenderId: "268759875143",
        appId: "1:268759875143:web:00031813d14107dfe03b62",
        databaseURL: "https://holmes-train-tracker-default-rtdb.firebaseio.com/"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- MAP SETUP ---
    const map = L.map('map', { zoomControl: false }).setView([23.8103, 90.4125], 7);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    const trainMarkers = {};
    const trainIcon = L.divIcon({ className: 'train-dot', iconSize: [14, 14] });

    // --- REAL-TIME LISTENER (FOR ALL USERS) ---
    db.ref('live_trains').on('value', (snapshot) => {
        const trains = snapshot.val();
        const now = Date.now();

        for (let key in trains) {
            const t = trains[key];
            
            // Filter: Only show trains active in the last 15 minutes
            if (now - t.timestamp < 900000) {
                if (!trainMarkers[key]) {
                    trainMarkers[key] = L.marker([t.lat, t.lng], {icon: trainIcon}).addTo(map)
                        .bindPopup(`<b>${key.replace('_',' ')}</b><br>Speed: ${t.speed} km/h<br>Dep: ${t.depTime}`);
                } else {
                    trainMarkers[key].setLatLng([t.lat, t.lng]);
                    trainMarkers[key].getPopup().setContent(`<b>${key.replace('_',' ')}</b><br>Speed: ${t.speed} km/h<br>Dep: ${t.depTime}`);
                }
            } else {
                // Remove stale markers
                if(trainMarkers[key]) {
                    map.removeLayer(trainMarkers[key]);
                    delete trainMarkers[key];
                }
            }
        }
    });

    // --- BROADCASTER LOGIC (FOR THE PASSENGER) ---
    let watchID = null;

    function toggleSystem() {
        const name = document.getElementById('trainName').value;
        const time = document.getElementById('depTime').value;
        const btn = document.getElementById('mainBtn');
        const overlay = document.getElementById('activeStats');

        if (!name || !time) {
            alert("Detective, please select the Train Name and Departure Time first!");
            return;
        }

        if (watchID === null) {
            // START
            if ("geolocation" in navigator) {
                overlay.style.display = 'block';
                document.getElementById('disp-name').innerText = name.replace('_',' ');
                document.getElementById('disp-dep').innerText = time;

                watchID = navigator.geolocation.watchPosition((pos) => {
                    const speed = Math.round((pos.coords.speed || 0) * 3.6);
                    const data = {
                        lat: pos.coords.latitude,
                        lng: pos.coords.longitude,
                        speed: speed,
                        depTime: time,
                        timestamp: Date.now()
                    };

                    db.ref('live_trains/' + name).set(data);
                    document.getElementById('disp-speed').innerText = speed + " KM/H";
                    
                    // Smoothly center map on user
                    map.panTo([pos.coords.latitude, pos.coords.longitude]);

                }, (err) => alert("GPS Error: " + err.message), 
                { enableHighAccuracy: true, maximumAge: 0 });

                btn.innerText = "Stop Broadcasting";
                btn.classList.add('active');
            }
        } else {
            // STOP
            navigator.geolocation.clearWatch(watchID);
            watchID = null;
            btn.innerText = "Start Broadcasting";
            btn.classList.remove('active');
            overlay.style.display = 'none';
        }
    }
</script>
</body>
</html>
