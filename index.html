<!DOCTYPE html>
<html lang="en">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>H.O.L.M.E.S. Command Center | Transit Radar</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        :root { 
            --npf-base: #182825; --npf-action: #016fb9; 
            --npf-accent: #22ade1; --npf-alert: #F42A41;
            --oled-black: #000000; --text-light: #f8fafc;
        }
        
        body, html { 
            margin: 0; padding: 0; height: 100dvh; min-height: -webkit-fill-available;
            font-family: 'Inter', sans-serif; background: var(--oled-black); 
            color: var(--text-light); overflow: hidden; 
        }
        
        #gate-screen { position: fixed; inset: 0; z-index: 9999; background: var(--oled-black); display: flex; align-items: center; justify-content: center; padding: 20px; }
        .gate-card { background: var(--npf-base); padding: 30px; border-radius: 12px; width: 100%; max-width: 400px; border-top: 4px solid var(--npf-action); box-shadow: 0 10px 30px rgba(1, 111, 185, 0.2); }
        .gate-input { width: 100%; padding: 14px; margin-bottom: 20px; background: var(--oled-black); border: 1px solid #334; color: white; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        
        .btn-gate { width: 100%; padding: 14px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; transition: 0.3s; }
        .btn-track { background: var(--npf-action); color: white; }
        .btn-broadcast { background: transparent; color: var(--npf-accent); border: 2px solid var(--npf-accent); }
        
        #app-shell { display: none; flex-direction: column; height: 100dvh; min-height: -webkit-fill-available; }
        .header { padding: 12px 20px; background: var(--npf-base); border-bottom: 2px solid var(--npf-action); display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        
        .alarm-bar { background: #0f172a; padding: 8px 20px; border-bottom: 1px solid #334; display: flex; gap: 10px; align-items: center; z-index: 1000; }
        .alarm-bar select { background: transparent; border: none; color: #fbbf24; font-weight: bold; font-size: 11px; width: 60%; outline: none; text-transform: uppercase; letter-spacing: 0.5px; }
        .btn-nav { background: #fbbf24; color: #000; border: none; padding: 6px 12px; border-radius: 4px; font-size: 10px; font-weight: 900; cursor: pointer; white-space: nowrap; }

        #map { flex-grow: 1; width: 100%; z-index: 1; background: var(--oled-black); min-height: 20vh; }
        
        /* ETA SEPARATE OVERLAY */
        #etaOverlay { 
            display: none; position: fixed; inset: 0; z-index: 2000; 
            background: var(--oled-black); padding: 30px; 
            flex-direction: column; justify-content: center; 
        }

        .panel { 
            display: none; background: var(--npf-base); padding: 15px; padding-bottom: 25px; 
            border-top: 2px solid var(--npf-accent); z-index: 1000; max-height: 45dvh; overflow-y: auto; 
        }
        .grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 10px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        
        select { background: var(--oled-black); border: 1px solid #445; color: white; padding: 12px; border-radius: 8px; width: 100%; font-size: 13px; box-sizing: border-box; }
        select:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .btn-action { width: 100%; padding: 16px; background: var(--npf-action); color: white; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; margin-top: 5px; flex-shrink: 0; }
        .btn-action.active { background: var(--npf-alert); }
    </style>
</head>

        function checkGeofence(currentLat, currentLng) {
            if (!targetAlarmStation || isAlarmTriggered) return;
            const target = stationCoords[targetAlarmStation];
            if (!target) return;
            const distKm = getHaversine(currentLat, currentLng, target.lat, target.lng);

                if ("vibrate" in navigator) navigator.vibrate([1000, 500, 1000, 500, 1000, 500, 2000]);
                alert(`⚠️ WAKE UP ALERT!\nThe train is within ${distKm.toFixed(1)} km of ${targetAlarmStation}. Prepare to disembark.`);
            }
        }

        function verifyTrackProximity(lat, lng, trainId) {
            const route = routeMatrix[trainId] || defaultStations;
            let validCoords = [];
            route.forEach(st => { if (stationCoords[st]) validCoords.push(stationCoords[st]); });
            if (validCoords.length < 2) return true; 
            let minDistance = Infinity;
            for (let i = 0; i < validCoords.length - 1; i++) {
                let p1 = validCoords[i]; let p2 = validCoords[i+1];
                let dx = p2.lng - p1.lng; let dy = p2.lat - p1.lat;
                let len2 = dx * dx + dy * dy;
                let t = Math.max(0, Math.min(1, ((lng - p1.lng) * dx + (lat - p1.lat) * dy) / len2));
                let dist = getHaversine(lat, lng, p1.lat + t * dy, p1.lng + t * dx);
                if (dist < minDistance) minDistance = dist;
            }
            return minDistance <= 15.0; 
        }

            for(let k in globalDbData) {
                const p = globalDbData[k];
                if (!latestByTrain[p.train] || p.ts > latestByTrain[p.train].ts) latestByTrain[p.train] = p;
            }
            for(let trainId in latestByTrain) {
                const p = latestByTrain[trainId];
                if (filterVal !== "" && p.train !== filterVal) continue;
                if(now - p.ts < 10800000) { 
                    markers[trainId] = L.marker([p.lat, p.lng]).addTo(map).bindPopup(`<b>${p.train.replace(/_/g, ' ')}</b><br>Speed: ${p.speed} KM/H`);
                }
            }
        }

        function loadMap() {
            const bdBounds = L.latLngBounds([20.0, 87.5], [27.0, 93.0]);
            map = L.map('map', {
                zoomControl: false, maxBounds: bdBounds, maxBoundsViscosity: 1.0, minZoom: 6
            }).setView([23.8103, 90.4125], 7);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19, noWrap: true, bounds: bdBounds }).addTo(map);
            L.tileLayer('https://{s}.tiles.openrailwaymap.org/standard/{z}/{x}/{y}.png', { maxZoom: 19, opacity: 0.6, noWrap: true, bounds: bdBounds }).addTo(map);
            db.ref('active_trains').on('value', snap => { globalDbData = snap.val() || {}; renderMarkers(); });
        }

        function getHaversine(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))); 
        }

        function calculateETA() {
            let dest = document.getElementById("etaStation").value;
            if(!dest) return alert("Select Target Destination.");
            let simulatedDistance = Math.floor(Math.random() * 250) + 20; 
            let timeInMinutes = Math.round((simulatedDistance / 72) * 60);
            document.getElementById('etaDisplay').innerText = `${timeInMinutes} MINS`;
        }

        function activateRealSOS() {
            let trainDrop = document.getElementById("tSelect");
            let train = (trainDrop && trainDrop.value) ? trainDrop.value.replace(/_/g, ' ') : "Unknown Train";
            let compartment = prompt(`🚨 SOS GEO-BEACON 🚨\nEnter Compartment & Seat:`);
            if(!compartment) return; 
            navigator.geolocation.getCurrentPosition(pos => {
                let msg = `🚨 EMERGENCY! I need help. Train: ${train}, Compartment: ${compartment}. Location: http://google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
            });
        }

        function reportCrowdDensity() {
            let station = document.getElementById("tStation").value;
            let level = prompt(`Crowd density at ${station}?\n1=Low, 2=Med, 3=High`);
            if (["1","2","3"].includes(level)) alert("✅ DATA LOGGED.");
        }

        let wID = null, lastLat = null, lastLng = null, lastTs = null, sLat = 0, sLng = 0; 

        async function toggleTelemetry() {
            const btn = document.getElementById('mBtn');
            const train = document.getElementById('tSelect').value;
            if(!train) return alert("Select a train.");
            if(!wID) {
                await requestWakeLock();
                wID = navigator.geolocation.watchPosition(pos => {
                    const cLat = pos.coords.latitude; const cLng = pos.coords.longitude; const now = Date.now();
                    if (!verifyTrackProximity(cLat, cLng, train)) {
                        db.ref('active_trains/' + uName).remove(); 
                        toggleTelemetry(); return;
                    }
                    const speed = Math.round((pos.coords.speed || 0) * 3.6);
                    document.getElementById('live-kmh').innerText = speed + " KM/H";
                    const payload = {
                        name: uName, train: train, station: document.getElementById('tStation').value,
                        crowd: document.getElementById('tCrowd').value, seat: document.getElementById('tSeat').value,
                        lat: cLat, lng: cLng, speed: speed, alt: Math.round(pos.coords.altitude || 0), hdg: Math.round(pos.coords.heading || 0), ts: now
                    };
                    db.ref('active_trains/' + uName).set(payload);
                    btn.innerText = "HALT BROADCAST"; btn.classList.add('active');
                });
            } else {
                navigator.geolocation.clearWatch(wID); wID = null;
                btn.innerText = "INITIATE BROADCAST"; btn.classList.remove('active');
            }
        }
    </script>
