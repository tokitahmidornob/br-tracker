<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BR Live Pro | Command Center V4</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #00ff88; --bg: #020617; --card: #1e293b; --text: #f8fafc; --danger: #ef4444; }
        body, html { margin: 0; padding: 0; height: 100vh; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
        
        /* --- ENTRY GATES --- */
        #gate-screen { position: fixed; inset: 0; z-index: 9999; background: var(--bg); display: flex; align-items: center; justify-content: center; padding: 20px; }
        .gate-card { background: var(--card); padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; border: 1px solid #334155; }
        .gate-input { width: 100%; padding: 12px; margin-bottom: 20px; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 8px; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-track { background: var(--primary); color: #000; }
        .btn-broadcast { background: transparent; border: 2px solid var(--primary); color: var(--primary); }

        /* --- DASHBOARD --- */
        #app-shell { display: none; flex-direction: column; height: 100vh; }
        .header { padding: 12px 20px; background: var(--card); border-bottom: 2px solid var(--primary); display: flex; justify-content: space-between; align-items: center; }
        #map { flex-grow: 1; width: 100%; }
        
        #telemetry { background: #0a0f1e; padding: 10px; border-top: 1px solid #334155; }
        #speedChart { max-height: 100px; width: 100% !important; }

        .panel { background: var(--card); padding: 15px; border-top: 2px solid #334155; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        select, input { background: #0f172a; border: 1px solid #334155; color: white; padding: 10px; border-radius: 6px; width: 100%; box-sizing: border-box; font-size: 13px; }
    </style>
</head>
<body>

    <div id="gate-screen">
        <div class="gate-card">
            <h1 style="color:var(--primary); margin:0;">🚂 BR LIVE <span style="font-weight:100">PRO</span></h1>
            <p style="color:#94a3b8; font-size:14px; margin-bottom:30px;">Choose Your Role</p>
            <input type="text" id="pName" class="gate-input" placeholder="Enter Your Name">
            <button class="btn-main btn-track" onclick="nav('track')">I WANT TO TRACK</button>
            <button class="btn-main btn-broadcast" onclick="nav('broadcast')">I AM ON THE TRAIN (BROADCAST)</button>
        </div>
    </div>

    <div id="app-shell">
        <header class="header">
            <h2 style="margin:0; font-size: 16px;">LIVE COMMAND</h2>
            <div id="live-kmh" style="font-weight:bold; color:var(--primary); font-size: 20px;">0 KM/H</div>
        </header>

        <div id="map"></div>

        <div id="telemetry"><canvas id="speedChart"></canvas></div>

        <div class="panel" id="bPanel" style="display:none;">
            <div class="grid">
                <select id="tSelect">
                    <option value="">-- Select Train --</option>
                    <optgroup label="Intercity Meter Gauge">
                        <option value="Subarna_Express_701">701 Subarna Express (07:00)</option>
                        <option value="Mohanagar_Goduli_703">703 Mohanagar Goduli (15:00)</option>
                        <option value="Ekota_Express_705">705 Ekota Express (10:00)</option>
                        <option value="Tista_Express_707">707 Tista Express (07:20)</option>
                        <option value="Parabat_Express_709">709 Parabat Express (06:40)</option>
                        <option value="Upukol_Express_711">711 Upukol Express (06:00)</option>
                        <option value="Joyantika_Express_717">717 Joyantika Express (12:00)</option>
                        <option value="Upaban_Express_739">739 Upaban Express (21:50)</option>
                        <option value="Turna_Express_741">741 Turna Express (23:00)</option>
                        <option value="Lalmoni_Express_751">751 Lalmoni Express (22:10)</option>
                        <option value="Drutojan_Express_757">757 Drutojan Express (19:40)</option>
                        <option value="Rangpur_Express_771">771 Rangpur Express (09:00)</option>
                    </optgroup>
                    <optgroup label="Intercity Broad Gauge">
                        <option value="Kapotaskh_Express_715">715 Kapotaskh (06:30)</option>
                        <option value="Sundarban_Express_725">725 Sundarban (19:30)</option>
                        <option value="Silk_City_753">753 Silk City (14:40)</option>
                        <option value="Padma_Express_759">759 Padma (23:10)</option>
                        <option value="Chittra_Express_763">763 Chittra (08:30)</option>
                    </optgroup>
                </select>
                <select id="tStatus"><option value="On Time">On Time</option><option value="Delayed">Delayed</option></select>
            </div>
            <div class="grid">
                <input type="text" id="tStation" placeholder="Delayed from Station?">
                <input type="number" id="tDelay" placeholder="Mins Late">
            </div>
            <button id="mBtn" onclick="run()" style="width:100%; padding:14px; background:var(--primary); color:#000; font-weight:bold; border:none; border-radius:10px;">START TELEMETRY</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAGLVy1OUiXKuqF4fwsR8KLdm-7-TuZt1g",
            authDomain: "holmes-train-tracker.firebaseapp.com",
            projectId: "holmes-train-tracker",
            databaseURL: "https://holmes-train-tracker-default-rtdb.firebaseio.com/",
            appId: "1:268759875143:web:00031813d14107dfe03b62"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let user = "";

        const speedChart = new Chart(document.getElementById('speedChart'), {
            type: 'line',
            data: { labels: Array(20).fill(''), datasets: [{ data: Array(20).fill(0), borderColor: '#00ff88', tension: 0.4, fill: true, backgroundColor: 'rgba(0, 255, 136, 0.1)' }] },
            options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true }, x: { display: false } }, plugins: { legend: { display: false } } }
        });

        function nav(m) {
            user = document.getElementById('pName').value;
            if(!user) return alert("Identify yourself!");
            document.getElementById('gate-screen').style.display = 'none';
            document.getElementById('app-shell').style.display = 'flex';
            if(m === 'broadcast') document.getElementById('bPanel').style.display = 'block';
            loadMap();
        }

        let map, markers = {};
        function loadMap() {
            map = L.map('map', {zoomControl: false}).setView([23.8103, 90.4125], 7);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            db.ref('active_probes').on('value', snap => {
                const data = snap.val() || {};
                for(let k in markers) map.removeLayer(markers[k]);
                for(let k in data) {
                    const p = data[k];
                    if(Date.now() - p.ts < 600000) {
                        markers[k] = L.marker([p.lat, p.lng]).addTo(map).bindPopup(`<b>${p.train}</b><br>Tracker: ${p.name}<br>Speed: ${p.speed} KM/H`);
                    }
                }
            });
        }

        let wID = null;
        function run() {
            const btn = document.getElementById('mBtn');
            const train = document.getElementById('tSelect').value;
            if(!train) return alert("Select your train!");

            if(!wID) {
                db.ref('active_probes').get().then(snap => {
                    if(snap.numChildren() >= 10) return alert("System limit reached (10 Probes).");
                    
                    wID = navigator.geolocation.watchPosition(pos => {
                        const speed = Math.round((pos.coords.speed || 0) * 3.6);
                        document.getElementById('live-kmh').innerText = speed + " KM/H";
                        speedChart.data.datasets[0].data.push(speed);
                        speedChart.data.datasets[0].data.shift();
                        speedChart.update('none');

                        db.ref('active_probes/' + user).set({
                            name: user, train, lat: pos.coords.latitude, lng: pos.coords.longitude,
                            speed: speed, status: document.getElementById('tStatus').value,
                            delay: document.getElementById('tDelay').value || 0,
                            station: document.getElementById('tStation').value || 'N/A', ts: Date.now()
                        });
                        btn.innerText = "STOP BROADCAST"; btn.style.background = "#ef4444";
                    }, null, {enableHighAccuracy: true});
                });
            } else {
                navigator.geolocation.clearWatch(wID); wID = null;
                db.ref('active_probes/' + user).remove();
                btn.innerText = "START TELEMETRY"; btn.style.background = "#00ff88";
            }
        }
    </script>
</body>
</html>
