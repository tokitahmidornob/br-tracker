<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BR Live Pro | Command Center</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        :root { --primary: #00ff88; --bg: #020617; --card: #1e293b; --text: #f8fafc; }
        
        /* Force the body to take full screen without scrolling */
        body, html { 
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text);
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* Header stays at the top */
        .header { 
            padding: 10px 20px; background: var(--card); border-bottom: 2px solid var(--primary);
            display: flex; justify-content: space-between; align-items: center; z-index: 1000;
        }

        /* Map fills all available middle space */
        #map { flex-grow: 1; width: 100%; z-index: 1; }

        /* Controls stay at the very bottom */
        .controls-area { 
            background: var(--card); padding: 15px; 
            border-top: 2px solid #334155; z-index: 1000;
        }

        .input-row { display: flex; gap: 10px; margin-bottom: 10px; }
        
        select, input { 
            flex: 1; background: #0f172a; border: 1px solid #334155; 
            color: white; padding: 12px; border-radius: 8px; font-size: 14px;
        }

        button { 
            width: 100%; background: var(--primary); color: #000; border: none; 
            padding: 14px; border-radius: 10px; font-weight: 800; cursor: pointer; 
        }

        button.active { background: #ef4444; color: white; }

        /* Status Overlay on Map */
        .status-overlay {
            position: absolute; top: 70px; left: 10px; z-index: 500;
            background: rgba(30, 41, 59, 0.9); padding: 10px; border-radius: 8px;
            border-left: 4px solid var(--primary); pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0; font-size: 18px;">🚂 BR LIVE <span style="color:var(--primary)">PRO</span></h2>
        <div id="live-speed" style="font-size: 14px; color:var(--primary); font-weight:bold;">0 KM/H</div>
    </div>

    <div id="map"></div>

    <div class="status-overlay" id="infoBox" style="display:none;">
        <div style="font-size:10px; color:#94a3b8">TRACKING:</div>
        <div id="active-train-name" style="font-size:14px; font-weight:bold;">-</div>
    </div>

    <div class="controls-area">
        <div class="input-row">
            <select id="trainName">
                <option value="">-- Select Train --</option>
                <optgroup label="Dhaka - Chittagong">
                    <option value="Subarna_Express">Subarna Express (701)</option>
                    <option value="Mohanagar_Provati">Mohanagar Provati (703)</option>
                    <option value="Turna_Express">Turna Express (741)</option>
                </optgroup>
                <optgroup label="Other Routes">
                    <option value="Ekota_Express">Ekota Express (705)</option>
                    <option value="Parabat_Express">Parabat Express (709)</option>
                </optgroup>
            </select>
            <input type="time" id="depTime">
        </div>
        <button id="mainBtn" onclick="toggleTracking()">START BROADCASTING</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAGLVy1OUiXKuqF4fwsR8KLdm-7-TuZt1g",
            authDomain: "holmes-train-tracker.firebaseapp.com",
            projectId: "holmes-train-tracker",
            databaseURL: "https://holmes-train-tracker-default-rtdb.firebaseio.com/",
            appId: "1:268759875143:web:00031813d14107dfe03b62"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const map = L.map('map', { zoomControl: false }).setView([23.8103, 90.4125], 7);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        const markers = {};
        db.ref('live_trains').on('value', snap => {
            const trains = snap.val();
            for (let id in trains) {
                const t = trains[id];
                if (Date.now() - t.timestamp < 600000) {
                    if (!markers[id]) markers[id] = L.marker([t.lat, t.lng]).addTo(map);
                    markers[id].setLatLng([t.lat, t.lng]).bindPopup(`<b>${id}</b><br>${t.speed} km/h`);
                }
            }
        });

        let watchID = null;
        function toggleTracking() {
            const name = document.getElementById('trainName').value;
            const time = document.getElementById('depTime').value;
            const btn = document.getElementById('mainBtn');

            if (!watchID) {
                if (!name || !time) return alert("Select Train & Time!");
                document.getElementById('infoBox').style.display = 'block';
                document.getElementById('active-train-name').innerText = name.replace('_', ' ');
                
                watchID = navigator.geolocation.watchPosition(pos => {
                    const speed = Math.round((pos.coords.speed || 0) * 3.6);
                    db.ref('live_trains/' + name).set({
                        lat: pos.coords.latitude,
                        lng: pos.coords.longitude,
                        speed: speed,
                        depTime: time,
                        timestamp: Date.now()
                    });
                    document.getElementById('live-speed').innerText = speed + " KM/H";
                    map.panTo([pos.coords.latitude, pos.coords.longitude]);
                }, null, { enableHighAccuracy: true });

                btn.innerText = "STOP BROADCASTING";
                btn.classList.add('active');
            } else {
                navigator.geolocation.clearWatch(watchID);
                watchID = null;
                btn.innerText = "START BROADCASTING";
                btn.classList.remove('active');
                document.getElementById('infoBox').style.display = 'none';
            }
        }
    </script>
</body>
</html>
