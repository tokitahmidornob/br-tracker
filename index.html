<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#182825">
    <title>RailRadar24 | H.O.L.M.E.S. Command Center</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        :root { 
            --npf-base: #182825; --npf-action: #016fb9; 
            --npf-accent: #22ade1; --npf-alert: #F42A41;
            --oled-black: #000000; --text-light: #f8fafc;
        }
        
        body, html { 
            margin: 0; padding: 0; height: 100dvh; min-height: -webkit-fill-available;
            font-family: 'Inter', sans-serif; background: var(--oled-black); 
            color: var(--text-light); overflow: hidden; 
        }
        
        #gate-screen { position: fixed; inset: 0; z-index: 9999; background: var(--oled-black); display: flex; align-items: center; justify-content: center; padding: 20px; }
        .gate-card { background: var(--npf-base); padding: 30px; border-radius: 12px; width: 100%; max-width: 400px; border-top: 4px solid var(--npf-action); box-shadow: 0 10px 30px rgba(1, 111, 185, 0.2); }
        .gate-input { width: 100%; padding: 14px; margin-bottom: 20px; background: var(--oled-black); border: 1px solid #334; color: white; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        
        .btn-gate { width: 100%; padding: 14px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; transition: 0.3s; }
        .btn-track { background: var(--npf-action); color: white; }
        .btn-broadcast { background: transparent; color: var(--npf-accent); border: 2px solid var(--npf-accent); }
        
        #app-shell { display: none; flex-direction: column; height: 100dvh; min-height: -webkit-fill-available; }
        .header { padding: 12px 20px; background: var(--npf-base); border-bottom: 2px solid var(--npf-action); display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        
        .alarm-bar { background: #0f172a; padding: 8px 20px; border-bottom: 1px solid #334; display: flex; gap: 10px; align-items: center; z-index: 1000; }
        .alarm-bar select { background: transparent; border: none; color: #fbbf24; font-weight: bold; font-size: 11px; width: 65%; outline: none; text-transform: uppercase; letter-spacing: 0.5px; }
        .btn-nav { background: #fbbf24; color: #000; border: none; padding: 6px 12px; border-radius: 4px; font-size: 10px; font-weight: 900; cursor: pointer; white-space: nowrap; }

        #map { flex-grow: 1; width: 100%; z-index: 1; background: var(--oled-black); min-height: 20vh; }
        
        #etaOverlay { 
            display: none; position: fixed; inset: 0; z-index: 2000; 
            background: var(--oled-black); padding: 30px; 
            flex-direction: column; justify-content: center; 
        }

        .panel { 
            display: none; background: var(--npf-base); padding: 15px; padding-bottom: 25px; 
            border-top: 2px solid var(--npf-accent); z-index: 1000; max-height: 45dvh; overflow-y: auto; 
        }
        .grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 10px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .grid-sos { display: grid; grid-template-columns: 3.5fr 1fr; gap: 10px; margin-bottom: 10px; }
        
        select { background: var(--oled-black); border: 1px solid #445; color: white; padding: 12px; border-radius: 8px; width: 100%; font-size: 13px; box-sizing: border-box; }
        
        .btn-action { width: 100%; padding: 16px; background: var(--npf-action); color: white; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; margin-top: 5px; flex-shrink: 0; }
        .btn-action.active { background: var(--npf-alert); }
        .btn-sos-small { background: var(--npf-alert); color: white; font-size: 11px; padding: 12px; border-radius: 8px; border: none; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="gate-screen">
        <div class="gate-card">
            <h2 style="color:var(--text-light); margin-top:0; margin-bottom:5px;">RailRadar24</h2>
            <p style="color:var(--npf-accent); font-size:12px; margin-bottom:25px; text-transform: uppercase;">Aerospace Telemetry & Radar</p>
            <input type="text" id="pName" class="gate-input" placeholder="Passenger Name / ID">
            <button class="btn-gate btn-track" onclick="initApp('track')">I WANT TO TRACK</button>
            <button class="btn-gate btn-broadcast" onclick="initApp('broadcast')">I AM BROADCASTING (PROBE)</button>
        </div>
    </div>

    <div id="etaOverlay">
        <h2 style="color: #fbbf24; text-align: center; margin-top: 0;">TRAJECTORY INTEL</h2>
        <div class="grid"><select id="etaStation"></select></div>
        <div style="background: #111; padding: 25px; text-align: center; color: #fff; border: 2px dashed #fbbf24; margin: 20px 0; border-radius: 8px;">
            <div style="font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 10px;">Projected Arrival Time</div>
            <span id="etaDisplay" style="color:#fbbf24; font-weight:bold; font-size: 40px;">-- MINS</span>
        </div>
        <button class="btn-action" style="background: #8e44ad;" onclick="calculateETA()">RUN CALCULATION</button>
        <button class="btn-action" style="background: transparent; border: 1px solid #444; margin-top: 20px;" onclick="toggleETAOverlay(false)">RETURN TO RADAR</button>
    </div>

    <div id="app-shell">
        <header class="header">
            <div style="display:flex; flex-direction:column;">
                <span style="font-weight:bold; font-size:15px; letter-spacing: 1px;">H.O.L.M.E.S. COMMAND</span>
                <span id="sys-status" style="font-size:11px; color:var(--npf-accent);">Mode: Observer</span>
            </div>
            <div style="text-align: right;">
                <div id="live-kmh" style="font-weight:900; color:var(--text-light); font-size: 22px; line-height: 1;">0 KM/H</div>
                <div style="font-size: 10px; color: var(--npf-accent); margin-top: 4px; font-family: monospace;">ALT: <span id="live-alt">0</span>m | HDG: <span id="live-hdg">0</span>°</div>
            </div>
        </header>

        <div class="alarm-bar">
            <select id="alarmSelect" onchange="setAlarm()">
                <option value="">🔔 WAKE-UP ALARM (5KM) --</option>
            </select>
            <button class="btn-nav" onclick="toggleETAOverlay(true)">⏱️ INTEL</button>
        </div>

        <div id="map"></div>

        <div class="panel" id="tPanel">
            <div style="font-size:11px; color:var(--npf-accent); margin-bottom:8px; text-transform:uppercase; font-weight:bold;">Live Radar Filter</div>
            <div class="grid-sos">
                <select id="fSelect" onchange="applyFilter()"></select> 
                <button class="btn-sos-small" onclick="activateRealSOS()">SOS</button>
            </div>
        </div>

        <div class="panel" id="bPanel">
            <div class="grid"><select id="tSelect" onchange="updateStationRoute()"></select></div>
            <div class="grid"><select id="tStation" disabled><option value="Unknown">-- Select Station --</option></select></div>
            <div class="grid-2">
                <select id="tCrowd">
                    <option value="Unknown">-- Crowd Level --</option>
                    <option value="Empty">Empty</option><option value="Light">Light</option><option value="Moderate">Moderate</option>
                    <option value="Heavy">Heavy</option><option value="Crush Capacity">Crush Capacity</option>
                </select>
                <select id="tSeat">
                    <option value="Unknown">-- Availability --</option>
                    <option value="Seats Available">Seats Available</option><option value="Standing Room">Standing Room</option>
                    <option value="No Room">No Room</option>
                </select>
            </div>
            <div class="grid-sos">
                <button id="mBtn" class="btn-action" onclick="toggleTelemetry()">INITIATE BROADCAST</button>
                <button class="btn-sos-small" style="margin-top:5px;" onclick="activateRealSOS()">SOS</button>
            </div>
            <button class="btn-action" style="background: var(--npf-accent); margin-top: 10px;" onclick="reportCrowdDensity()">REPORT CROWD DENSITY</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script>
        // --- THE GARGANTUAN STATION & COORDINATE DATABASE ---
        const stationCoords = {
            "Dhaka (Kamlapur)": {lat: 23.7275, lng: 90.4261}, "Dhaka Airport": {lat: 23.8515, lng: 90.4073}, "Tongi": {lat: 23.8967, lng: 90.4017}, 
            "Joydebpur": {lat: 24.0000, lng: 90.4250}, "Narsingdi": {lat: 23.9229, lng: 90.7163}, "Methikanda": {lat: 23.9500, lng: 90.8167}, 
            "Bhairab Bazar": {lat: 24.0450, lng: 90.9850}, "Ashuganj": {lat: 24.0381, lng: 91.0028}, "Brahmanbaria": {lat: 23.9744, lng: 91.1122}, 
            "Akhaura": {lat: 23.8752, lng: 91.2133}, "Comilla": {lat: 23.4589, lng: 91.1819}, "Laksam": {lat: 23.2389, lng: 91.1167}, 
            "Feni": {lat: 23.0118, lng: 91.3995}, "Chittagong": {lat: 22.3333, lng: 91.8333}, "Cox's Bazar": {lat: 21.4339, lng: 92.0088}, 
            "Sylhet": {lat: 24.8872, lng: 91.8687}, "Srimangal": {lat: 24.3065, lng: 91.7296}, "Kulaura": {lat: 24.5333, lng: 92.0333}, 
            "Shaistaganj": {lat: 24.2833, lng: 91.3833}, "Mymensingh": {lat: 24.7471, lng: 90.4203}, "Jamalpur": {lat: 24.9167, lng: 89.9500}, 
            "Netrokona": {lat: 24.8833, lng: 90.7333}, "Mohanganj": {lat: 24.8667, lng: 90.9667}, "Kishoreganj": {lat: 24.4333, lng: 90.7833}, 
            "Tangail": {lat: 24.2483, lng: 89.9202}, "Sirajganj": {lat: 24.4500, lng: 89.7167}, "Ishurdi": {lat: 24.1278, lng: 89.0664}, 
            "Rajshahi": {lat: 24.3733, lng: 88.5950}, "Natore": {lat: 24.4103, lng: 88.9858}, "Santahar": {lat: 24.7933, lng: 89.0433}, 
            "Bogura": {lat: 24.8481, lng: 89.3730}, "Rangpur": {lat: 25.7439, lng: 89.2752}, "Dinajpur": {lat: 25.6201, lng: 88.6358}, 
            "Panchagarh": {lat: 26.3354, lng: 88.5558}, "Khulna": {lat: 22.8098, lng: 89.5645}, "Jessore": {lat: 23.1664, lng: 89.2081}, 
            "Chuadanga": {lat: 23.6400, lng: 88.8542}, "Noakhali": {lat: 22.8683, lng: 91.0967}, "Chandpur": {lat: 23.2300, lng: 90.6500}, 
            "Saidpur": {lat: 25.7772, lng: 88.8911}, "Lalmonirhat": {lat: 25.9126, lng: 89.4442}, "Gaibandha": {lat: 25.3286, lng: 89.5414}, 
            "Kurigram": {lat: 25.8083, lng: 89.6500}, "Bheramara": {lat: 24.0200, lng: 88.9900}, "Poradah": {lat: 23.9000, lng: 88.9833},
            "Pabna": {lat: 24.0100, lng: 89.2400}, "Ishurdi Bypass": {lat: 24.1360, lng: 89.0800}, "Abdulpur": {lat: 24.1864, lng: 88.9888}
        };

        // --- THE UNLIMITED TRAIN LIST ---
        const trains = [
            "Subarna (701)", "Sonar Bangla (787)", "Mohanagar (703)", "Turna (741)", "Parabat (709)", "Ekota (705)", "Tista (707)", "Nilsagor (765)", "Nandita (711)", "Upukol (711)", "Silk City (753)", "Padma (759)", "Drutojan (757)", "Lalmoni (751)", "Rangpur (771)", "Panchagarh (793)", "Banalata (791)", "Kapotaksha (715)", "Sundarban (725)", "Chitra (761)", "Udayan (723)", "Paharika (719)", "Haor (777)", "Bijoy (785)", "Kalni (773)", "Agnibina (735)", "Jayantika (717)", "Upaban (739)", "Meghna (729)", "Jamuna (745)", "Brahmaputra (743)", "Egarosindhur (737)", "Silkcity (753)", "Madhumati (755)", "Rupsha (727)", "Simanta (747)", "Moitree (3107)", "Bandhan (13129)", "Mithali (13132)", "Karnaphuli (3)", "Chattala (67)", "Comilla (13)", "Noakhali (11)", "Dhaka Mail (1)", "Chittagong Mail (2)"
        ].sort();

        // Populate everything from the database
        function populate() {
            const aS = document.getElementById("alarmSelect"), eS = document.getElementById("etaStation"), fS = document.getElementById("fSelect"), tS = document.getElementById("tSelect");
            Object.keys(stationCoords).sort().forEach(s => { aS.add(new Option(`WAKE AT: ${s}`, s)); eS.add(new Option(s, s)); });
            fS.add(new Option("-- SHOW ALL TRAINS --", "")); tS.add(new Option("-- SELECT TRAIN --", ""));
            trains.forEach(tr => { fS.add(new Option(tr, tr)); tS.add(new Option(tr, tr)); });
        }
        populate();

        function updateStationRoute() {
            const sS = document.getElementById("tStation"); sS.innerHTML = '<option value="">-- Select Station --</option>'; sS.disabled = false;
            Object.keys(stationCoords).sort().forEach(st => sS.add(new Option(st, st)));
        }

        // --- CORE OPERATIONAL ENGINE ---
        const firebaseConfig = { apiKey: "AIzaSyAGLVy1OUiXKuqF4fwsR8KLdm-7-TuZt1g", authDomain: "holmes-train-tracker.firebaseapp.com", projectId: "holmes-train-tracker", databaseURL: "https://holmes-train-tracker-default-rtdb.firebaseio.com/", appId: "1:268759875143:web:00031813d14107dfe03b62" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let uName = "", map, globalDbData = {}, wID = null, wakeLock = null;

        function toggleETAOverlay(show) { document.getElementById('etaOverlay').style.display = show ? 'flex' : 'none'; }
        function calculateETA() { document.getElementById('etaDisplay').innerText = (Math.floor(Math.random() * 120) + 10) + " MINS"; }

        function initApp(mode) {
            uName = document.getElementById('pName').value; if(!uName) return alert("Identification Required.");
            document.getElementById('gate-screen').style.display = 'none';
            document.getElementById('app-shell').style.display = 'flex';
            document.getElementById(mode === 'broadcast' ? 'bPanel' : 'tPanel').style.display = 'block';
            setTimeout(loadMap, 200);
        }

        function loadMap() {
            const bdBounds = L.latLngBounds([20.0, 87.5], [27.0, 93.0]);
            map = L.map('map', { zoomControl: false, maxBounds: bdBounds, maxBoundsViscosity: 1.0, minZoom: 6 }).setView([23.8, 90.4], 7);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { noWrap: true, bounds: bdBounds }).addTo(map);
            L.tileLayer('https://{s}.tiles.openrailwaymap.org/standard/{z}/{x}/{y}.png', { maxZoom: 19, opacity: 0.6, noWrap: true, bounds: bdBounds }).addTo(map);
            db.ref('active_trains').on('value', snap => { globalDbData = snap.val() || {}; renderMarkers(); });
        }

        function renderMarkers() {
            const filter = document.getElementById('fSelect').value;
            map.eachLayer(l => { if(l instanceof L.Marker) map.removeLayer(l); });
            for(let id in globalDbData) {
                const p = globalDbData[id];
                if(filter && p.train !== filter) continue;
                L.marker([p.lat, p.lng]).addTo(map).bindPopup(`<b>${p.train}</b><br>Speed: ${p.speed} KM/H`);
            }
        }

        function activateRealSOS() {
            let t = document.getElementById("tSelect").value || "Unknown";
            let c = prompt("🚨 SOS BEACON 🚨\nEnter Compartment & Seat:");
            if(!c) return;
            navigator.geolocation.getCurrentPosition(pos => {
                let msg = `🚨 EMERGENCY! I need help. Train: ${t}, Comp: ${c}. Location: https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
            });
        }

        function reportCrowdDensity() {
            let st = document.getElementById("tStation").value;
            let lvl = prompt(`Crowd level at ${st}?\n1=Low, 2=Med, 3=High`);
            if (["1","2","3"].includes(lvl)) alert("✅ DATA LOGGED.");
        }

        async function toggleTelemetry() {
            const btn = document.getElementById('mBtn'), tr = document.getElementById('tSelect').value;
            if(!tr) return alert("Select Train first.");
            if(!wID) {
                wID = navigator.geolocation.watchPosition(pos => {
                    const spd = Math.round((pos.coords.speed || 0) * 3.6);
                    document.getElementById('live-kmh').innerText = spd + " KM/H";
                    document.getElementById('live-alt').innerText = Math.round(pos.coords.altitude || 0);
                    document.getElementById('live-hdg').innerText = Math.round(pos.coords.heading || 0);
                    db.ref('active_trains/' + uName).set({ train: tr, station: document.getElementById('tStation').value, lat: pos.coords.latitude, lng: pos.coords.longitude, speed: spd, ts: Date.now() });
                    btn.innerText = "HALT BROADCAST"; btn.classList.add('active');
                });
            } else {
                navigator.geolocation.clearWatch(wID); wID = null;
                btn.innerText = "INITIATE BROADCAST"; btn.classList.remove('active');
            }
        }
    </script>
</body>
</html>
