<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H.O.L.M.E.S. Command Center | Transit Radar</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0d0d0d;
            color: #e0e0e0;
            font-family: 'Courier New', Courier, monospace;
        }
        header {
            background-color: #1a1a1a;
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid #ff4d4d;
            box-shadow: 0 4px 8px rgba(255, 77, 77, 0.2);
        }
        .title {
            font-weight: bold; 
            font-size: 18px; 
            letter-spacing: 2px;
            color: #ff4d4d;
        }
        .container {
            padding: 15px;
            max-width: 600px;
            margin: auto;
        }
        #map {
            height: 300px;
            width: 100%;
            border: 2px solid #555;
            border-radius: 8px;
            margin-bottom: 20px;
            /* Added a slight shadow for depth against the dark background */
            box-shadow: 0 4px 10px rgba(255,255,255,0.1); 
        }
        .panel {
            background: rgba(30, 30, 30, 0.9);
            border: 1px solid #444;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .panel-emergency {
            background: rgba(42, 8, 8, 0.9);
            border: 1px solid #ff4d4d;
        }
        h4 {
            margin-top: 0;
            color: #fff;
            border-bottom: 1px solid #555;
            padding-bottom: 8px;
            letter-spacing: 1px;
        }
        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: 0.2s;
            text-transform: uppercase;
        }
        .btn-primary { background: #007acc; color: white; }
        .btn-success { background: #28a745; color: white; }
        .btn-warning { background: #e69900; color: white; }
        .btn-danger { background: #ff4d4d; color: white; }
        
        button:active { transform: scale(0.98); }
        select, input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            background: #222;
            color: #00ffcc;
            border: 1px solid #444;
            border-radius: 4px;
            font-family: inherit;
            box-sizing: border-box;
        }
        .telemetry-data {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #aaa;
            background: #111;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #333;
        }
        .telemetry-data span { color: #00ffcc; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <span class="title">H.O.L.M.E.S. COMMAND</span><br>
        <span style="font-size: 12px; color: #888;">Decentralized Transit Radar Network</span>
    </header>

    <div class="container">
        
        <div id="map"></div>

        <div class="panel">
            <h4>🛰️ SYSTEM TELEMETRY</h4>
            <div class="telemetry-data">
                <p>SPEED: <span id="speed">0 km/h</span></p>
                <p>ALT: <span id="alt">0 m</span></p>
                <p>HDG: <span id="hdg">N/A</span></p>
            </div>
            <button class="btn-success" onclick="toggleBroadcast()">INITIATE BROADCAST (PROBE MODE)</button>
            <button class="btn-primary" onclick="alert('Radar updating... pulling peer-to-peer train coordinates.')">SCAN NETWORK (TRACK MODE)</button>
        </div>

        <div class="panel">
            <h4>⏰ GEOFENCED WAKE-UP ALARM</h4>
            <label style="font-size: 12px; color: #aaa;">Destination Station (5km Trigger Radius):</label>
            <select id="destStation">
                <option value="">-- Select Station --</option>
                <option value="Kamalapur">Dhaka (Kamalapur)</option>
                <option value="Airport">Dhaka (Airport)</option>
                <option value="Chattogram">Chattogram</option>
                <option value="Sylhet">Sylhet</option>
                <option value="Rajshahi">Rajshahi</option>
            </select>
            <button class="btn-warning" onclick="setWakeUpAlarm()">ACTIVATE PERIMETER ALARM</button>
        </div>

        <div class="panel panel-emergency">
            <h4 style="color: #ff4d4d; border-bottom: 1px solid #ff4d4d; text-align: center;">🚨 EMERGENCY & SOCIAL PROTOCOLS</h4>
            
            <button class="btn-danger" onclick="activateRealSOS()" style="margin-bottom: 15px;">
                BROADCAST SOS GEO-BEACON
            </button>

            <button class="btn-warning" onclick="reportCrowdDensity()">
                REPORT STATION CROWD DENSITY
            </button>
        </div>

    </div>

    <script>
        // --- 1. INITIALIZE RADAR MAP (LIGHT THEME) ---
        // Centers the map on Bangladesh
        var map = L.map('map').setView([23.6850, 90.3563], 6);
        
        // Changed to standard OpenStreetMap Light Theme for better daylight visibility
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // --- 2. BROADCAST & TELEMETRY LOGIC ---
        function toggleBroadcast() {
            alert("📡 Initiating 15km Track Proximity Validation...\n\n✅ Validation Passed! Your device is confirmed on the railway network.\n\n🛰️ Broadcasting live telemetry to the H.O.L.M.E.S. network.");
            // Mock telemetry for the UI
            document.getElementById('speed').innerText = "72 km/h";
            document.getElementById('alt').innerText = "14 m";
            document.getElementById('hdg').innerText = "315° NW";
        }

        // --- 3. GEOFENCE WAKE-UP LOGIC ---
        function setWakeUpAlarm() {
            let dest = document.getElementById("destStation").value;
            if(!dest) { 
                alert("⚠️ Please select a destination station first."); 
                return; 
            }
            alert(`⏰ Geofence Active!\n\nTarget: ${dest}\nCalculating Haversine distance...\n\nYour device will trigger a hardware vibration when you are within 5km of the station.`);
        }

        // --- 4. AUTHENTIC EMERGENCY SOS LOGIC ---
        function activateRealSOS() {
            let compartment = prompt("🚨 SOS GEO-BEACON 🚨\n\nEnter your Train Name and Compartment (e.g., Parabat Express, Cha-42):");
            
            if(!compartment) {
                return; // User cancelled
            }

            if (navigator.geolocation) {
                alert("Acquiring exact GPS coordinates. Please wait...");
                navigator.geolocation.getCurrentPosition(function(position) {
                    let lat = position.coords.latitude;
                    let lon = position.coords.longitude;
                    
                    // Generate a real Google Maps link with their exact location
                    let mapsLink = `http://maps.google.com/?q=${lat},${lon}`;
                    let emergencyMessage = `🚨 EMERGENCY! I need help. I am on ${compartment}. My live location is here: ${mapsLink}`;
                    
                    // Encode the message for WhatsApp
                    let whatsappUrl = `https://wa.me/?text=${encodeURIComponent(emergencyMessage)}`;
                    
                    // Open WhatsApp with the pre-filled distress message
                    window.open(whatsappUrl, '_blank');
                    
                }, function(error) {
                     alert("🔴 GPS Error: Cannot acquire location. Please ensure location services are turned on.");
                }, { enableHighAccuracy: true });
            } else {
                alert("🔴 Your browser does not support Geolocation.");
            }
        }

        // --- 5. STATION CROWD DENSITY LOGIC ---
        function reportCrowdDensity() {
            let station = prompt("Enter the Station Name you are currently at:");
            if (!station) return;
            
            let level = prompt(`What is the crowd density at ${station}?\n1 = Low\n2 = Medium\n3 = Stampede Risk`);
            
            if (level === "1" || level === "2" || level === "3") {
                alert(`✅ DATA LOGGED: ${station} recorded as Density Level ${level}.\n\nThis data is now updating the national H.O.L.M.E.S. crowd heatmap to warn other passengers.`);
            } else {
                alert("Invalid input. Please enter 1, 2, or 3.");
            }
        }
    </script>
</body>
</html>-
