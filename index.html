<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#182825">
    <title>Bangladesh Railway | Smart Route Telemetry</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        /* NPF Official Color Palette */
        :root { 
            --npf-base: #182825; 
            --npf-action: #016fb9; 
            --npf-accent: #22ade1; 
            --npf-alert: #F42A41;
            --oled-black: #000000;
            --text-light: #f8fafc;
        }
        
        body, html { 
            margin: 0; padding: 0; 
            height: 100dvh; 
            min-height: -webkit-fill-available;
            font-family: 'Inter', sans-serif; 
            background: var(--oled-black); 
            color: var(--text-light); 
            overflow: hidden; 
        }
        
        /* --- GATES & MODALS --- */
        #gate-screen { position: fixed; inset: 0; z-index: 9999; background: var(--oled-black); display: flex; align-items: center; justify-content: center; padding: 20px; }
        .gate-card { background: var(--npf-base); padding: 30px; border-radius: 12px; width: 100%; max-width: 400px; border-top: 4px solid var(--npf-action); box-shadow: 0 10px 30px rgba(1, 111, 185, 0.2); }
        .gate-input { width: 100%; padding: 14px; margin-bottom: 20px; background: var(--oled-black); border: 1px solid #334; color: white; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        
        .btn-gate { width: 100%; padding: 14px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; transition: 0.3s; }
        .btn-track { background: var(--npf-action); color: white; }
        .btn-broadcast { background: transparent; color: var(--npf-accent); border: 2px solid var(--npf-accent); }
        
        /* --- MAIN DASHBOARD --- */
        #app-shell { display: none; flex-direction: column; height: 100dvh; min-height: -webkit-fill-available; }
        .header { padding: 12px 20px; background: var(--npf-base); border-bottom: 2px solid var(--npf-action); display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        #map { flex-grow: 1; width: 100%; z-index: 1; background: var(--oled-black); min-height: 20vh; }
        
        /* --- DYNAMIC METADATA PANEL --- */
        .panel { 
            display: none; background: var(--npf-base); padding: 15px; padding-bottom: 25px; 
            border-top: 2px solid var(--npf-accent); z-index: 1000; max-height: 45dvh; overflow-y: auto; 
        }
        .grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 10px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        
        select { background: var(--oled-black); border: 1px solid #445; color: white; padding: 12px; border-radius: 8px; width: 100%; font-size: 13px; }
        select:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .btn-action { width: 100%; padding: 16px; background: var(--npf-action); color: white; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; margin-top: 5px; flex-shrink: 0; }
        .btn-action.active { background: var(--npf-alert); }
    </style>
</head>
<body>

    <div id="gate-screen">
        <div class="gate-card">
            <h2 style="color:var(--text-light); margin-top:0; margin-bottom:5px;">বাংলাদেশ রেলওয়ে</h2>
            <p style="color:var(--npf-accent); font-size:12px; margin-bottom:25px; text-transform: uppercase;">Dynamic Route Telemetry</p>
            
            <input type="text" id="pName" class="gate-input" placeholder="Passenger Name / ID">
            
            <button class="btn-gate btn-track" onclick="initApp('track')">I WANT TO TRACK</button>
            <button class="btn-gate btn-broadcast" onclick="initApp('broadcast')">I AM BROADCASTING (PROBE)</button>
        </div>
    </div>

    <div id="app-shell">
        <header class="header">
            <div style="display:flex; flex-direction:column;">
                <span style="font-weight:bold; font-size:15px; letter-spacing: 1px;">BNDA COMMAND</span>
                <span id="sys-status" style="font-size:11px; color:var(--npf-accent);">Mode: Observer</span>
            </div>
            <div id="live-kmh" style="font-weight:900; color:var(--text-light); font-size: 22px;">0 KM/H</div>
        </header>

        <div id="map"></div>

        <div class="panel" id="bPanel">
            <div class="grid">
                <select id="tSelect" onchange="updateStationRoute()">
                    <option value="">-- SELECT YOUR TRAIN --</option>
                    <optgroup label="Dhaka - Chattogram Route">
                        <option value="701-702_Subarna">701/702 Subarna Express</option>
                        <option value="703-704_Mohanagar">703/704 Mohanagar Goduli/Provati</option>
                        <option value="741-742_Turna">741/742 Turna Express</option>
                        <option value="787-788_Sonar_Bangla">787/788 Sonar Bangla Express</option>
                    </optgroup>
                    <optgroup label="Dhaka - Sylhet / Noakhali Route">
                        <option value="709-710_Parabat">709/710 Parabat Express</option>
                        <option value="711-712_Upukol">711/712 Upukol Express</option>
                        <option value="717-718_Joyantika">717/718 Joyantika Express</option>
                        <option value="739-740_Upaban">739/740 Upaban Express</option>
                        <option value="773-774_Kalani">773/774 Kalani Express</option>
                    </optgroup>
                    <optgroup label="Dhaka - North Bengal Route">
                        <option value="705-706_Ekota">705/706 Ekota Express</option>
                        <option value="707-708_Tista">707/708 Tista Express</option>
                        <option value="757-758_Drutojan">757/758 Drutojan Express</option>
                        <option value="771-772_Rangpur">771/772 Rangpur Express</option>
                        <option value="765-766_Nilsagar">765/766 Nilsagar Express</option>
                    </optgroup>
                    <optgroup label="Broad Gauge (Khulna/Rajshahi)">
                        <option value="725-726_Sundarban">725/726 Sundarban Express</option>
                        <option value="753-754_Silk_City">753/754 Silk City Express</option>
                        <option value="759-760_Padma">759/760 Padma Express</option>
                        <option value="763-764_Chittra">763/764 Chittra Express</option>
                    </optgroup>
                    <optgroup label="Mail / Express">
                        <option value="1-2_Dhaka_Mail">1/2 Dhaka Mail</option>
                        <option value="3-4_Karnaphuli">3/4 Karnaphuli Express</option>
                        <option value="11-12_Noakhali_Exp">11/12 Dhaka/Noakhali Express</option>
                    </optgroup>
                </select>
            </div>
            
            <div class="grid">
                <select id="tStation" disabled>
                    <option value="Unknown">-- Awaiting Train Selection --</option>
                </select>
            </div>

            <div class="grid-2">
                <select id="tCrowd">
                    <option value="Unknown">-- Crowd Level --</option>
                    <option value="Empty">Empty</option>
                    <option value="Light">Light</option>
                    <option value="Moderate">Moderate</option>
                    <option value="Heavy">Heavy</option>
                    <option value="Crush Capacity">Crush Capacity</option>
                </select>
                <select id="tSeat">
                    <option value="Unknown">-- Availability --</option>
                    <option value="Seats Available">Seats Available</option>
                    <option value="Standing Room Only">Standing Room Only</option>
                    <option value="No Standing Room">No Standing Room</option>
                </select>
            </div>
            <button id="mBtn" class="btn-action" onclick="toggleTelemetry()">INITIATE BROADCAST</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script>
        // --- ROUTE MATRIX DATABASE ---
        // Maps Train IDs to their specific station stops
        const routeMatrix = {
            "701-702_Subarna": ["Dhaka (Kamlapur)", "Dhaka Airport", "Chittagong"],
            "703-704_Mohanagar": ["Dhaka", "Dhaka Airport", "Bhairab Bazar", "Brahmanbaria", "Akhaura", "Comilla", "Laksam", "Feni", "Chittagong"],
            "741-742_Turna": ["Dhaka", "Dhaka Airport", "Bhairab Bazar", "Brahmanbaria", "Akhaura", "Comilla", "Laksam", "Feni", "Chittagong"],
            "787-788_Sonar_Bangla": ["Dhaka (Kamlapur)", "Dhaka Airport", "Chittagong"],
            
            "711-712_Upukol": ["Dhaka", "Dhaka Airport", "Narsingdi", "Bhairab Bazar", "Ashuganj", "Brahmanbaria", "Akhaura", "Comilla", "Laksam", "Natherpetua", "Sonaimuri", "Bajra", "Chowmuhani", "Maijdee Court", "Noakhali"],
            "11-12_Noakhali_Exp": ["Dhaka", "Dhaka Airport", "Narsingdi", "Bhairab Bazar", "Brahmanbaria", "Akhaura", "Comilla", "Laksam", "Natherpetua", "Sonaimuri", "Bajra", "Chowmuhani", "Maijdee Court", "Noakhali"],
            
            "709-710_Parabat": ["Dhaka", "Dhaka Airport", "Bhairab Bazar", "Brahmanbaria", "Azampur", "Akhaura", "Noapara", "Shaistaganj", "Srimangal", "Bhanugach", "Shamshernagar", "Kulaura", "Baramchal", "Maijgaon", "Sylhet"],
            "717-718_Joyantika": ["Dhaka", "Dhaka Airport", "Narsingdi", "Bhairab Bazar", "Brahmanbaria", "Akhaura", "Mukundapur", "Harashpur", "Shaistaganj", "Srimangal", "Bhanugach", "Shamshernagar", "Kulaura", "Maijgaon", "Sylhet"],
            "739-740_Upaban": ["Dhaka", "Dhaka Airport", "Narsingdi", "Bhairab Bazar", "Brahmanbaria", "Akhaura", "Shaistaganj", "Srimangal", "Bhanugach", "Kulaura", "Maijgaon", "Sylhet"],
            "773-774_Kalani": ["Dhaka", "Dhaka Airport", "Narsingdi", "Bhairab Bazar", "Brahmanbaria", "Akhaura", "Shaistaganj", "Srimangal", "Bhanugach", "Kulaura", "Maijgaon", "Sylhet"],
            
            "705-706_Ekota": ["Dhaka", "Dhaka Airport", "Joydebpur", "Tangail", "B.B. Setu East", "S.M. Mansur Ali", "Ullapara", "Boral Bridge", "Chatmohar", "Ishurdi Bypass", "Natore", "Santahar", "Akkelpur", "Joypurhat", "Panchbibi", "Hili", "Phulbari", "Parbatipur", "Dinajpur", "Thakurgaon Road", "Panchagarh"],
            "757-758_Drutojan": ["Dhaka", "Dhaka Airport", "Joydebpur", "Tangail", "B.B. Setu East", "S.M. Mansur Ali", "Ullapara", "Boral Bridge", "Chatmohar", "Ishurdi Bypass", "Natore", "Santahar", "Akkelpur", "Joypurhat", "Panchbibi", "Hili", "Phulbari", "Parbatipur", "Dinajpur", "Thakurgaon Road", "Panchagarh"],
            "771-772_Rangpur": ["Dhaka", "Dhaka Airport", "Joydebpur", "Tangail", "B.B. Setu East", "S.M. Mansur Ali", "Ullapara", "Boral Bridge", "Chatmohar", "Ishurdi Bypass", "Natore", "Santahar", "Bogura", "Sonatola", "Bonarpara", "Gaibandha", "Bamondanga", "Pirgachha", "Kaunia", "Kurigram", "Rangpur"],
            "765-766_Nilsagar": ["Dhaka Cantt", "Dhaka Airport", "Joydebpur", "Tangail", "B.B. Setu East", "S.M. Mansur Ali", "Ullapara", "Boral Bridge", "Chatmohar", "Ishurdi Bypass", "Natore", "Santahar", "Akkelpur", "Joypurhat", "Panchbibi", "Hili", "Phulbari", "Parbatipur", "Saidpur", "Nilphamari", "Domar", "Chilahati"],
            
            "725-726_Sundarban": ["Dhaka", "Dhaka Airport", "Joydebpur", "Tangail", "B.B. Setu East", "S.M. Mansur Ali", "Ullapara", "Boral Bridge", "Chatmohar", "Ishurdi", "Hardinge Bridge", "Poradah", "Kushtia", "Chuadanga", "Darshana", "Kotchandpur", "Jessore", "Noapara", "Khulna"],
            "763-764_Chittra": ["Dhaka", "Dhaka Airport", "Joydebpur", "Tangail", "B.B. Setu East", "S.M. Mansur Ali", "Ullapara", "Boral Bridge", "Chatmohar", "Ishurdi", "Hardinge Bridge", "Poradah", "Kushtia", "Chuadanga", "Darshana", "Kotchandpur", "Jessore", "Noapara", "Khulna"],
            "753-754_Silk_City": ["Dhaka", "Dhaka Airport", "Joydebpur", "Tangail", "B.B. Setu East", "S.M. Mansur Ali", "Ullapara", "Boral Bridge", "Chatmohar", "Ishurdi Bypass", "Abdulpur", "Rajshahi"],
            "759-760_Padma": ["Dhaka", "Dhaka Airport", "Joydebpur", "Tangail", "B.B. Setu East", "S.M. Mansur Ali", "Ullapara", "Boral Bridge", "Chatmohar", "Ishurdi Bypass", "Abdulpur", "Rajshahi"]
        };

        const defaultStations = ["Dhaka", "Dhaka Airport", "Chittagong", "Rajshahi", "Khulna", "Sylhet", "Bhairab Bazar", "Akhaura", "Comilla", "Laksam", "Noakhali", "Joydebpur", "Tangail", "Ishurdi", "Parbatipur", "Santahar", "Dinajpur"];

        // --- DYNAMIC STATION POPULATION ---
        function updateStationRoute() {
            const trainSelect = document.getElementById("tSelect").value;
            const stationSelect = document.getElementById("tStation");
            
            stationSelect.innerHTML = '<option value="Unknown">-- Select Current Station --</option>';
            
            if (trainSelect === "") {
                stationSelect.disabled = true;
                return;
            }

            stationSelect.disabled = false;
            let routeArray = routeMatrix[trainSelect] || defaultStations;

            routeArray.forEach(station => {
                let option = document.createElement("option");
                option.value = station;
                option.text = station;
                stationSelect.appendChild(option);
            });
        }

        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyAGLVy1OUiXKuqF4fwsR8KLdm-7-TuZt1g",
            authDomain: "holmes-train-tracker.firebaseapp.com",
            projectId: "holmes-train-tracker",
            databaseURL: "https://holmes-train-tracker-default-rtdb.firebaseio.com/",
            appId: "1:268759875143:web:00031813d14107dfe03b62"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let uName = "";
        let wakeLock = null;

        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    document.getElementById('sys-status').innerText = "Wake Lock: Active (Probe Mode)";
                    wakeLock.addEventListener('release', () => {
                        if (wID) document.getElementById('sys-status').innerText = "Wake Lock: Released!";
                    });
                }
            } catch (err) { console.error(`Wake Lock Error: ${err.message}`); }
        }

        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible' && wID) {
                await requestWakeLock();
            }
        });

        function initApp(mode) {
            uName = document.getElementById('pName').value;
            if(!uName) return alert("Verification Required: Enter your Name or Ticket ID");
            
            document.getElementById('gate-screen').style.display = 'none';
            document.getElementById('app-shell').style.display = 'flex';
            
            if (mode === 'broadcast') {
                document.getElementById('bPanel').style.display = 'block';
                document.getElementById('sys-status').innerText = "Mode: Probe (Ready to Broadcast)";
            } else {
                document.getElementById('bPanel').style.display = 'none';
                document.getElementById('sys-status').innerText = "Mode: Detector (Tracking Only)";
            }
            
            setTimeout(() => { loadMap(); }, 200);
        }

        let map, markers = {};
        function loadMap() {
            map = L.map('map', {zoomControl: false}).setView([23.8103, 90.4125], 7);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);
            L.tileLayer('https://{s}.tiles.openrailwaymap.org/standard/{z}/{x}/{y}.png', { maxZoom: 19, opacity: 0.6 }).addTo(map);
            
            db.ref('active_trains').on('value', snap => {
                const data = snap.val() || {};
                for(let k in markers) map.removeLayer(markers[k]);
                for(let k in data) {
                    const p = data[k];
                    if(Date.now() - p.ts < 600000) {
                        markers[k] = L.marker([p.lat, p.lng]).addTo(map).bindPopup(`
                            <b style="color:var(--npf-action); font-size:14px;">${p.train.replace(/_/g, ' ')}</b><br>
                            Tracker: ${p.name}<br>
                            Station: ${p.station}<br>
                            Crowd: ${p.crowd}<br>
                            Speed: <b>${p.speed} KM/H</b>
                        `);
                    }
                }
            });
        }

        function getHaversine(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c; 
        }

        let wID = null;
        let lastLat = null, lastLng = null, lastTs = null;
        let sLat = 0, sLng = 0; 

        async function toggleTelemetry() {
            const btn = document.getElementById('mBtn');
            const train = document.getElementById('tSelect').value;
            if(!train) return alert("Select a train designation to begin.");

            if(!wID) {
                await requestWakeLock();

                wID = navigator.geolocation.watchPosition(pos => {
                    const cLat = pos.coords.latitude;
                    const cLng = pos.coords.longitude;
                    const now = Date.now();

                    if (lastLat && lastTs) {
                        const distKm = getHaversine(lastLat, lastLng, cLat, cLng);
                        const timeHr = (now - lastTs) / 3600000;
                        if (timeHr > 0 && (distKm / timeHr) > 130) return; 
                    }

                    const alpha = 0.3;
                    if (sLat === 0) { sLat = cLat; sLng = cLng; }
                    sLat = (cLat * alpha) + (sLat * (1 - alpha));
                    sLng = (cLng * alpha) + (sLng * (1 - alpha));

                    lastLat = cLat; lastLng = cLng; lastTs = now;

                    let speed = Math.round((pos.coords.speed || 0) * 3.6);
                    document.getElementById('live-kmh').innerText = speed + " KM/H";
                    
                    const payload = {
                        name: uName, train: train,
                        station: document.getElementById('tStation').value,
                        crowd: document.getElementById('tCrowd').value,
                        lat: sLat, lng: sLng, speed: speed, ts: now
                    };

                    const dateStr = new Date().toISOString().split('T')[0];
                    db.ref(`raw_telemetry/${dateStr}/broadcasts/${uName}`).set(payload);
                    db.ref('active_trains/' + uName).set(payload);
                    
                    btn.innerText = "HALT BROADCAST"; btn.classList.add('active');
                }, (err) => alert("Geospatial Lock Failed: " + err.message), 
                { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 });
            } else {
                navigator.geolocation.clearWatch(wID); wID = null;
                if (wakeLock !== null) { wakeLock.release(); wakeLock = null; }
                
                db.ref('active_trains/' + uName).remove();
                btn.innerText = "INITIATE BROADCAST"; btn.classList.remove('active');
                document.getElementById('sys-status').innerText = "Mode: Probe (Standby)";
            }
        }
    </script>
</body>
</html>
