<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BR Live Pro | Final Telemetry</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #00ff88; --bg: #020617; --card: #1e293b; --text: #f8fafc; --danger: #ef4444; }
        body, html { margin: 0; padding: 0; height: 100vh; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
        #gate-screen { position: fixed; inset: 0; z-index: 9999; background: var(--bg); display: flex; align-items: center; justify-content: center; padding: 20px; }
        .gate-card { background: var(--card); padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; border: 1px solid #334155; }
        .btn-main { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .btn-track { background: var(--primary); color: #000; }
        #app-shell { display: none; flex-direction: column; height: 100vh; }
        .header { padding: 10px 20px; background: var(--card); border-bottom: 2px solid var(--primary); display: flex; justify-content: space-between; align-items: center; }
        #map { flex: 2; width: 100%; }
        #telemetry { flex: 1; background: #0a0f1e; padding: 10px; border-top: 1px solid #334155; }
        #speedChart { max-height: 120px; width: 100% !important; }
        .panel { background: var(--card); padding: 15px; border-top: 2px solid var(--primary); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        select, input { background: #0f172a; border: 1px solid #334155; color: white; padding: 10px; border-radius: 6px; width: 100%; font-size: 13px; }
    </style>
</head>
<body>

    <div id="gate-screen">
        <div class="gate-card">
            <h1 style="color:var(--primary); margin:0;">🚂 BR LIVE <span style="font-weight:100">PRO</span></h1>
            <input type="text" id="pName" style="width:100%; padding:10px; margin:20px 0; border-radius:8px; border:none;" placeholder="Enter Name">
            <button class="btn-main btn-track" onclick="nav('broadcast')">START COMMAND CENTER</button>
        </div>
    </div>

    <div id="app-shell">
        <header class="header">
            <h2 style="margin:0; font-size: 14px;">COMMAND CENTER</h2>
            <div id="live-kmh" style="font-weight:bold; color:var(--primary); font-size: 22px;">0 KM/H</div>
        </header>

        <div id="map"></div>
        <div id="telemetry"><canvas id="speedChart"></canvas></div>

        <div class="panel">
            <div class="grid">
                <select id="tSelect">
                    <option value="Upukol_Express_711">711 Upukol Express (Noakhali to Dhaka) </option>
                    <option value="Subarna_Express_701">701 Subarna Express (Chittagong to Dhaka) </option>
                    <option value="Mohanagar_Provati_704">704 Mohanagar Provati (Dhaka to Chittagong) </option>
                    <option value="Ekota_Express_705">705 Ekota Express (Dhaka to Dinajpur) </option>
                    <option value="Sundarban_Express_725">725 Sundarban Express (Khulna to Dhaka) [cite: 3]</option>
                    <option value="Dhaka_Mail_1">01 Dhaka Mail (Chittagong to Dhaka) [cite: 5]</option>
                </select>
                <select id="tStatus">
                    <option value="On Time">On Time</option>
                    <option value="Delayed">Delayed</option>
                </select>
            </div>
            <div class="grid">
                <input type="text" id="tStation" placeholder="Delayed from Station?">
                <input type="number" id="tDelay" placeholder="Mins Late">
            </div>
            <button id="mBtn" onclick="run()" style="width:100%; padding:14px; background:var(--primary); color:#000; font-weight:bold; border:none; border-radius:10px;">START TELEMETRY</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAGLVy1OUiXKuqF4fwsR8KLdm-7-TuZt1g",
            authDomain: "holmes-train-tracker.firebaseapp.com",
            projectId: "holmes-train-tracker",
            databaseURL: "https://holmes-train-tracker-default-rtdb.firebaseio.com/",
            appId: "1:268759875143:web:00031813d14107dfe03b62"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const speedChart = new Chart(document.getElementById('speedChart'), {
            type: 'line',
            data: { labels: Array(20).fill(''), datasets: [{ data: Array(20).fill(0), borderColor: '#00ff88', tension: 0.4, fill: true, backgroundColor: 'rgba(0, 255, 136, 0.1)' }] },
            options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true }, x: { display: false } }, plugins: { legend: { display: false } } }
        });

        function nav() {
            if(!document.getElementById('pName').value) return alert("Identify yourself!");
            document.getElementById('gate-screen').style.display = 'none';
            document.getElementById('app-shell').style.display = 'flex';
            loadMap();
        }

        let map, markers = {};
        function loadMap() {
            map = L.map('map', {zoomControl: false}).setView([23.8103, 90.4125], 7);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            db.ref('active_probes').on('value', snap => {
                const data = snap.val() || {};
                for(let k in markers) map.removeLayer(markers[k]);
                for(let k in data) {
                    const p = data[k];
                    markers[k] = L.marker([p.lat, p.lng]).addTo(map).bindPopup(`<b>${p.train}</b><br>Tracker: ${p.name}<br>Speed: ${p.speed} KM/H`);
                }
            });
        }

        let wID = null;
        function run() {
            const btn = document.getElementById('mBtn');
            if(!wID) {
                // SENSOR CALIBRATION: Requesting the highest possible GPS frequency
                wID = navigator.geolocation.watchPosition(pos => {
                    // UNIT CALCULATION: m/s to km/h conversion
                    let speed = pos.coords.speed;
                    if (speed === null || speed < 0) speed = 0; 
                    const kmh = Math.round(speed * 3.6);

                    document.getElementById('live-kmh').innerText = kmh + " KM/H";
                    speedChart.data.datasets[0].data.push(kmh);
                    speedChart.data.datasets[0].data.shift();
                    speedChart.update('none');

                    db.ref('active_probes/' + document.getElementById('pName').value).set({
                        name: document.getElementById('pName').value,
                        train: document.getElementById('tSelect').value,
                        status: document.getElementById('tStatus').value,
                        station: document.getElementById('tStation').value || "N/A",
                        delay: document.getElementById('tDelay').value || "0",
                        lat: pos.coords.latitude, lng: pos.coords.longitude,
                        speed: kmh, ts: Date.now()
                    });
                    btn.innerText = "STOP TRANSMISSION"; btn.style.background = "#ef4444";
                }, (err) => alert("GPS Error: " + err.message), 
                { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 });
            } else {
                navigator.geolocation.clearWatch(wID); wID = null;
                db.ref('active_probes/' + document.getElementById('pName').value).remove();
                btn.innerText = "START TELEMETRY"; btn.style.background = "#00ff88";
            }
        }
    </script>
</body>
</html>
