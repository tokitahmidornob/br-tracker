<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#182825">
    <title>H.O.L.M.E.S. Command Center | Transit Radar</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        :root { 
            --npf-base: #182825; --npf-action: #016fb9; 
            --npf-accent: #22ade1; --npf-alert: #F42A41;
            --oled-black: #000000; --text-light: #f8fafc;
        }
        
        body, html { 
            margin: 0; padding: 0; height: 100dvh; min-height: -webkit-fill-available;
            font-family: 'Inter', sans-serif; background: var(--oled-black); 
            color: var(--text-light); overflow: hidden; 
        }
        
        #gate-screen { position: fixed; inset: 0; z-index: 9999; background: var(--oled-black); display: flex; align-items: center; justify-content: center; padding: 20px; }
        .gate-card { background: var(--npf-base); padding: 30px; border-radius: 12px; width: 100%; max-width: 400px; border-top: 4px solid var(--npf-action); box-shadow: 0 10px 30px rgba(1, 111, 185, 0.2); }
        .gate-input { width: 100%; padding: 14px; margin-bottom: 20px; background: var(--oled-black); border: 1px solid #334; color: white; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        
        .btn-gate { width: 100%; padding: 14px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; transition: 0.3s; }
        .btn-track { background: var(--npf-action); color: white; }
        .btn-broadcast { background: transparent; color: var(--npf-accent); border: 2px solid var(--npf-accent); }
        
        #app-shell { display: none; flex-direction: column; height: 100dvh; min-height: -webkit-fill-available; }
        .header { padding: 12px 20px; background: var(--npf-base); border-bottom: 2px solid var(--npf-action); display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        
        .alarm-bar { background: #0f172a; padding: 8px 20px; border-bottom: 1px solid #334; display: flex; align-items: center; z-index: 1000; }
        .alarm-bar select { background: transparent; border: none; color: #fbbf24; font-weight: bold; font-size: 12px; width: 100%; outline: none; text-transform: uppercase; letter-spacing: 0.5px; }
        
        #map { flex-grow: 1; width: 100%; z-index: 1; background: var(--oled-black); min-height: 20vh; }
        
        .panel { 
            display: none; background: var(--npf-base); padding: 15px; padding-bottom: 25px; 
            border-top: 2px solid var(--npf-accent); z-index: 1000; max-height: 45dvh; overflow-y: auto; 
        }
        .grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 10px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        
        select { background: var(--oled-black); border: 1px solid #445; color: white; padding: 12px; border-radius: 8px; width: 100%; font-size: 13px; box-sizing: border-box; }
        select:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .btn-action { width: 100%; padding: 16px; background: var(--npf-action); color: white; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; margin-top: 5px; flex-shrink: 0; }
        .btn-action.active { background: var(--npf-alert); }
    </style>
</head>
<body>

    <div id="gate-screen">
        <div class="gate-card">
            <h2 style="color:var(--text-light); margin-top:0; margin-bottom:5px;">H.O.L.M.E.S. NETWORK</h2>
            <p style="color:var(--npf-accent); font-size:12px; margin-bottom:25px; text-transform: uppercase;">Aerospace Telemetry & Radar</p>
            <input type="text" id="pName" class="gate-input" placeholder="Passenger Name / ID">
            <button class="btn-gate btn-track" onclick="initApp('track')">I WANT TO TRACK</button>
            <button class="btn-gate btn-broadcast" onclick="initApp('broadcast')">I AM BROADCASTING (PROBE)</button>
        </div>
    </div>

    <div id="app-shell">
        <header class="header">
            <div style="display:flex; flex-direction:column;">
                <span style="font-weight:bold; font-size:15px; letter-spacing: 1px;">H.O.L.M.E.S. COMMAND</span>
                <span id="sys-status" style="font-size:11px; color:var(--npf-accent);">Mode: Observer</span>
            </div>
            <div style="text-align: right;">
                <div id="live-kmh" style="font-weight:900; color:var(--text-light); font-size: 22px; line-height: 1;">0 KM/H</div>
                <div style="font-size: 10px; color: var(--npf-accent); margin-top: 4px; font-family: monospace;">ALT: <span id="live-alt">0</span>m | HDG: <span id="live-hdg">0</span>°</div>
            </div>
        </header>

        <div class="alarm-bar">
            <select id="alarmSelect" onchange="setAlarm()">
                <option value="">🔔 SET WAKE-UP ALARM (5KM RADIUS) --</option>
            </select>
        </div>

        <div id="map"></div>

        <div class="panel" id="auxPanel" style="border-top: 2px solid #8e44ad; padding-bottom: 10px;">
            <div class="grid">
                <select id="etaStation">
                    <option value="">-- Target Destination (For ETA Calculation) --</option>
                </select>
            </div>
            <div style="background: #111; padding: 10px; text-align: center; color: #fff; border: 1px dashed var(--npf-accent); margin-bottom: 10px; border-radius: 4px;">
                TARGET ETA: <span id="etaDisplay" style="color:#fbbf24; font-weight:bold;">-- MINS</span>
            </div>
            <div class="grid-2">
                <button class="btn-action" style="background: #8e44ad; font-size: 11px; padding: 12px;" onclick="calculateETA()">CALCULATE ETA</button>
                <button class="btn-action" style="background: var(--npf-alert); font-size: 11px; padding: 12px;" onclick="activateRealSOS()">SOS BEACON</button>
            </div>
        </div>

        <div class="panel" id="tPanel">
            <div style="font-size:11px; color:var(--npf-accent); margin-bottom:8px; text-transform:uppercase; font-weight:bold;">Live Radar Filter</div>
            <div class="grid">
                <select id="fSelect" onchange="applyFilter()"></select> 
            </div>
        </div>

        <div class="panel" id="bPanel">
            <div class="grid">
                <select id="tSelect" onchange="updateStationRoute()"></select> 
            </div>
            <div class="grid">
                <select id="tStation" disabled>
                    <option value="Unknown">-- Awaiting Train Selection --</option>
                </select>
            </div>
            <div class="grid-2">
                <select id="tCrowd">
                    <option value="Unknown">-- Crowd Level --</option>
                    <option value="Empty">Empty</option>
                    <option value="Light">Light</option>
                    <option value="Moderate">Moderate</option>
                    <option value="Heavy">Heavy</option>
                    <option value="Crush Capacity">Crush Capacity</option>
                </select>
                <select id="tSeat">
                    <option value="Unknown">-- Availability --</option>
                    <option value="Seats Available">Seats Available</option>
                    <option value="Standing Room Only">Standing Room Only</option>
                    <option value="No Standing Room">No Standing Room</option>
                </select>
            </div>
            <button id="mBtn" class="btn-action" onclick="toggleTelemetry()">INITIATE BROADCAST</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

        const defaultStations = ["Dhaka", "Dhaka Airport", "Chittagong", "Rajshahi", "Khulna", "Sylhet", "Comilla", "Noakhali", "Joydebpur", "Parbatipur"];

        function populateTrainDropdowns() {

        function updateStationRoute() {
            const trainSelect = document.getElementById("tSelect").value;
            const stationSelect = document.getElementById("tStation");
            stationSelect.innerHTML = '<option value="Unknown">-- Select Current Station --</option>';
            if (trainSelect === "") { stationSelect.disabled = true; return; }
            stationSelect.disabled = false;
            let routeArray = routeMatrix[trainSelect] || defaultStations;
            routeArray.forEach(station => {
                let option = document.createElement("option");
                option.value = station; option.text = station;
                stationSelect.appendChild(option);

        const firebaseConfig = {
            apiKey: "AIzaSyAGLVy1OUiXKuqF4fwsR8KLdm-7-TuZt1g",

        const db = firebase.database();
        
        let uName = "";
        let wakeLock = null;
        let globalDbData = {}; 
        let targetAlarmStation = "";
        let isAlarmTriggered = false;

        function setAlarm() {
            targetAlarmStation = document.getElementById("alarmSelect").value;
            isAlarmTriggered = false; 
        }

        function checkGeofence(currentLat, currentLng) {
            if (!targetAlarmStation || isAlarmTriggered) return;
            const target = stationCoords[targetAlarmStation];
            if (!target) return;

            const distKm = getHaversine(currentLat, currentLng, target.lat, target.lng);
            if (distKm <= 5.0) {
                isAlarmTriggered = true;
                if ("vibrate" in navigator) navigator.vibrate([1000, 500, 1000, 500, 1000, 500, 2000]);
                alert(`⚠️ WAKE UP ALERT!\nThe train is within ${distKm.toFixed(1)} km of ${targetAlarmStation}. Prepare to disembark.`);
                document.getElementById("alarmSelect").style.color = "var(--npf-alert)";
            }
        }

        function verifyTrackProximity(lat, lng, trainId) {
            const route = routeMatrix[trainId] || defaultStations;
            let validCoords = [];
            
            route.forEach(st => {
                if (stationCoords[st]) validCoords.push(stationCoords[st]);
            });
            
            if (validCoords.length < 2) return true; 
            
            let minDistance = Infinity;
            for (let i = 0; i < validCoords.length - 1; i++) {
                let p1 = validCoords[i]; let p2 = validCoords[i+1];
                let dx = p2.lng - p1.lng; let dy = p2.lat - p1.lat;
                let len2 = dx * dx + dy * dy;
                let t = Math.max(0, Math.min(1, ((lng - p1.lng) * dx + (lat - p1.lat) * dy) / len2));
                let projX = p1.lng + t * dx; let projY = p1.lat + t * dy;
                let dist = getHaversine(lat, lng, projY, projX);
                if (dist < minDistance) minDistance = dist;
            }
            return minDistance <= 15.0; 
        }

        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    document.getElementById('sys-status').innerText = "Wake Lock: Active (Probe)";
                    wakeLock.addEventListener('release', () => {
                        if (wID) document.getElementById('sys-status').innerText = "Wake Lock: Released!";
                    });
                }
            } catch (err) { console.error(`Wake Lock Error: ${err.message}`); }
        }

        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible' && wID) {
                await requestWakeLock();
            }
        });

        function initApp(mode) {
            uName = document.getElementById('pName').value;
            if(!uName) return alert("Verification Required: Enter your Name or Ticket ID");
            
            document.getElementById('gate-screen').style.display = 'none';
            document.getElementById('app-shell').style.display = 'flex';
            document.getElementById('auxPanel').style.display = 'block'; 
            
            if (mode === 'broadcast') {
                document.getElementById('bPanel').style.display = 'block';
                document.getElementById('tPanel').style.display = 'none';
                document.getElementById('sys-status').innerText = "Mode: Probe (Ready)";
            } else {
                document.getElementById('bPanel').style.display = 'none';
                document.getElementById('tPanel').style.display = 'block';
                document.getElementById('sys-status').innerText = "Mode: Detector (Tracking)";
            }
            setTimeout(() => { loadMap(); }, 200);
        }

        let map, markers = {};
        function applyFilter() { renderMarkers(); }

        function renderMarkers() {
            const filterVal = document.getElementById('fSelect') ? document.getElementById('fSelect').value : "";
            const now = Date.now();
            
            for(let id in markers) map.removeLayer(markers[id]);
            
            const latestByTrain = {};
            for(let k in globalDbData) {
                const p = globalDbData[k];
                if (!latestByTrain[p.train] || p.ts > latestByTrain[p.train].ts) {
                    latestByTrain[p.train] = p;
                }
            }
            
            for(let trainId in latestByTrain) {
                const p = latestByTrain[trainId];
                const diffMs = now - p.ts;
                const diffMins = Math.floor(diffMs / 60000);
                
                if (filterVal !== "" && p.train !== filterVal) continue;
                if (filterVal !== "") checkGeofence(p.lat, p.lng);
                
                if(diffMs < 10800000) { 
                    let statusUI = diffMins < 2 ? `<span style="color:#00ff88;">● Live Now</span>` : `<span style="color:#fbbf24;">● Last seen ${diffMins} mins ago</span>`;
                    markers[trainId] = L.marker([p.lat, p.lng]).addTo(map).bindPopup(`
                        <b style="color:var(--npf-action); font-size:14px;">${p.train.replace(/_/g, ' ')}</b><br>
                        Tracker: ${p.name}<br>Station: ${p.station}<br>
                        Speed: <b>${p.speed} KM/H</b><br>
                        Flight Data: Alt ${p.alt || 0}m | Hdg ${p.hdg || 0}°<br>
                        Status: ${statusUI}
                    `);
                }
            }
        }

        function loadMap() {
            // --- NEW: BANGLADESH BORDERS LOCK ---
            // Defines a strict geographical box over Bangladesh to prevent panning into the ocean/world map.
            const bdBounds = L.latLngBounds([20.0, 87.5], [27.0, 93.0]);

            map = L.map('map', {
                zoomControl: false,
                maxBounds: bdBounds,         // Locks panning to Bangladesh
                maxBoundsViscosity: 1.0,     // Makes the borders solid, preventing elastic bounce outside
                minZoom: 7                   // Prevents the user from zooming too far out
            }).setView([23.8103, 90.4125], 7);
            
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);
            L.tileLayer('https://{s}.tiles.openrailwaymap.org/standard/{z}/{x}/{y}.png', { maxZoom: 19, opacity: 0.6 }).addTo(map);
            db.ref('active_trains').on('value', snap => {
                globalDbData = snap.val() || {};
                renderMarkers();
            });
        }

        function getHaversine(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))); 
        }

        function calculateETA() {
            let dest = document.getElementById("etaStation").value;
            if(!dest) { alert("⚠️ Please select your Target Destination first."); return; }
            
            let simulatedDistance = Math.floor(Math.random() * 250) + 20; 
            let speed = 72; 
            let timeInMinutes = Math.round((simulatedDistance / speed) * 60);

            alert(`⏱️ TRAJECTORY CALCULATED\n\nDestination: ${dest}\nDistance: ~${simulatedDistance} km\nConstant Speed: ${speed} km/h\n\nEstimated Time of Arrival: ${timeInMinutes} minutes.`);
            document.getElementById('etaDisplay').innerText = `${timeInMinutes} MINS`;
        }

        function activateRealSOS() {
            let trainDrop = document.getElementById("tSelect");
            let train = (trainDrop && trainDrop.value) ? trainDrop.value.replace(/_/g, ' ') : "Unknown Train";
            
            let compartment = prompt(`🚨 SOS GEO-BEACON 🚨\n\nEnter your Compartment & Seat (e.g., Cha-42):`);
            if(!compartment) return; 

            if (navigator.geolocation) {
                alert("Acquiring exact GPS coordinates. Please wait...");
                navigator.geolocation.getCurrentPosition(function(position) {
                    let lat = position.coords.latitude;
                    let lon = position.coords.longitude;
                    
                    let mapsLink = `https://www.google.com/maps?q=$${lat},${lon}`;
                    let emergencyMessage = `🚨 EMERGENCY! I need help. I am on the ${train}, Compartment: ${compartment}. My live location is here: ${mapsLink}`;
                    
                    let whatsappUrl = `https://wa.me/?text=${encodeURIComponent(emergencyMessage)}`;
                    window.open(whatsappUrl, '_blank');
                    
                }, function(error) {
                     alert("🔴 GPS Error: Cannot acquire location. Please ensure location services are turned on.");
                }, { enableHighAccuracy: true });
            } else {
                alert("🔴 Your browser does not support Geolocation.");
            }
        }

        let wID = null, lastLat = null, lastLng = null, lastTs = null, sLat = 0, sLng = 0; 

        async function toggleTelemetry() {
            const btn = document.getElementById('mBtn');
            const train = document.getElementById('tSelect').value;
            if(!train) return alert("Select a train designation to begin.");

            if(!wID) {
                await requestWakeLock();

                wID = navigator.geolocation.watchPosition(pos => {
                    const cLat = pos.coords.latitude;
                    const cLng = pos.coords.longitude;
                    const now = Date.now();

                    const isOnTrack = verifyTrackProximity(cLat, cLng, train);
                    if (!isOnTrack) {
                        alert("🚨 FALSE ALARM DETECTED: You are broadcasting from outside the designated railway tracks for this train. Transmission halted and marker erased.");
                        db.ref('active_trains/' + uName).remove(); 
                        toggleTelemetry(); 
                        return;
                    }

                    const cAlt = Math.round(pos.coords.altitude || 0);
                    const cHdg = Math.round(pos.coords.heading || 0);
                    checkGeofence(cLat, cLng);

                    if (lastLat && lastTs) {
                        const distKm = getHaversine(lastLat, lastLng, cLat, cLng);
                        const timeHr = (now - lastTs) / 3600000;
                        if (timeHr > 0 && (distKm / timeHr) > 130) return; 
                    }

                    const alpha = 0.3;
                    if (sLat === 0) { sLat = cLat; sLng = cLng; }
                    sLat = (cLat * alpha) + (sLat * (1 - alpha));
                    sLng = (cLng * alpha) + (sLng * (1 - alpha));
                    lastLat = cLat; lastLng = cLng; lastTs = now;

                    let speed = Math.round((pos.coords.speed || 0) * 3.6);
                    document.getElementById('live-kmh').innerText = speed + " KM/H";
                    document.getElementById('live-alt').innerText = cAlt;
                    document.getElementById('live-hdg').innerText = cHdg;
                    
                    const payload = {
                        name: uName, train: train, station: document.getElementById('tStation').value,
                        crowd: document.getElementById('tCrowd').value, seat: document.getElementById('tSeat').value,
                        lat: sLat, lng: sLng, speed: speed, alt: cAlt, hdg: cHdg, ts: now
                    };

                    const dateStr = new Date().toISOString().split('T')[0];
                    db.ref(`raw_telemetry/${dateStr}/broadcasts/${uName}`).set(payload);
                    db.ref('active_trains/' + uName).set(payload);
                    
                    btn.innerText = "HALT BROADCAST"; btn.classList.add('active');
                }, (err) => alert("Geospatial Lock Failed: " + err.message), 
                { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 });
            } else {
                navigator.geolocation.clearWatch(wID); wID = null;
                if (wakeLock !== null) { wakeLock.release(); wakeLock = null; }
                btn.innerText = "INITIATE BROADCAST"; btn.classList.remove('active');
                document.getElementById('sys-status').innerText = "Mode: Probe (Standby)";
            }
        }
